services:
  # Streamlit Dashboard with Docker
  - type: web
    name: graph-fraud-detector-dashboard
    runtime: image
    image:
      url: python:3.12-slim
    buildCommand: |
      pip install poetry
      poetry config virtualenvs.create false
      poetry install --no-root --no-interaction --no-ansi
    startCommand: |
      streamlit run src/ui/dashboard.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: PYTORCH_MPS_HIGH_WATERMARK_RATIO
        value: 0.0

  # FastAPI Service with Docker
  - type: web
    name: graph-fraud-detector-api
    runtime: image
    image:
      url: python:3.12-slim
    buildCommand: |
      pip install poetry
      poetry config virtualenvs.create false
      poetry install --no-root --no-interaction --no-ansi
    startCommand: |
      cd src/api && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: PYTORCH_MPS_HIGH_WATERMARK_RATIO
        value: 0.0